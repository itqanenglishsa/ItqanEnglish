<script>
// تخزين الكورسات التي يمتلكها المستخدم حالياً وحالة تسجيل دخوله
let userPurchasedKeys = [];
let isLoggedIn = false;

// المسار الموحد والثابت لفتح محتوى الدورة بعد الشراء
const COURSE_VIEW_URL = "course-view.html?id=english-foundation";

const SKILL_COURSES = {
  Foundation: {
    All: [
      { key: "english-foundation", level: "Free", price: 59 }
    ],
    Free: [
      { key: "english-foundation", level: "Free", price: 59 }
    ]
  }
};

async function checkUserStatus() {
  if (window.supabaseClient) {
    try {
      const { data: { user } } = await window.supabaseClient.auth.getUser();
      if (user) {
        isLoggedIn = true;
        const { data: userCourses } = await window.supabaseClient
          .from('user_courses')
          .select('course_key');
        
        if (userCourses) {
          userPurchasedKeys = userCourses.map(item => item.course_key);
        }
      } else {
        isLoggedIn = false;
      }
    } catch (err) {
      console.error("Error checking user status:", err);
    }
  }
}

async function renderCourses(){
  const lang = getLang();
  const featuredContainer = document.getElementById("featured");

  // فحص حالة المستخدم والكورسات المشتراة من سوبابيز أولاً
  await checkUserStatus();

  // 🔹 1) بناء قسم Featured courses ذكياً
  if (featuredContainer) {
    featuredContainer.innerHTML = COURSES
      .filter(c => c.featured)
      .map(c => {
        const isPurchased = userPurchasedKeys.includes(c.key);
        const cardHtml = renderCourseCard(c, lang, isPurchased);
        if (isPurchased) {
          return cardHtml.replace(/href="[^"]*profile\.html[^"]*"/g, `href="${COURSE_VIEW_URL}"`);
        }
        return cardHtml;
      })
      .join('');
  }
  
  const LEVELS = {
    Foundation: ["All", "Free"]
  };
  const SKILLS = ["Foundation"];

  // نبني الفلاتر لكل مهارة
  SKILLS.forEach(skill => {
    const filterEl = document.getElementById(`${skill.toLowerCase()}-filters`);
    if (filterEl) {
      filterEl.innerHTML = LEVELS[skill].map(level => {
        let label = level;
        if(level === "All") label = t("filter.all");
        else if(level === "Free") label = t("filter.free");
        else if(level.startsWith("+")){
          const num = level.replace("+","");
          label = getLang() === "ar" ? "+" + num.replace(/\d/g, d => "٠١٢٣٤٥٦٧٨٩"[d]) : level;
        }

        return `
          <button class="filter-btn" onclick="setActiveFilter(this, '${skill}', '${level}')">
            ${label}
          </button>
        `;
      }).join('');
    }

    renderSkill(skill, "All");
  });
}

function setActiveFilter(btn, skill, level){
  document.querySelectorAll(`#${skill.toLowerCase()}-filters .filter-btn`)
    .forEach(b => b.classList.remove('active-filter'));

  btn.classList.add('active-filter');
  renderSkill(skill, level);
}

function formatNumber(num){
  const lang = getLang();
  const n = Number(num);
  if (isNaN(n)) return num;

  return lang === "ar" ? n.toLocaleString("ar-EG") : n.toLocaleString("en-US");
}

function renderSkill(skill, level){
  const courses = SKILL_COURSES[skill][level];

  const courseCards = courses.map((c) => {
    // جلب بيانات الكورس بالكامل وديناميكياً من COURSES الموحدة في app.js لمنع اختفاء العربي
    const fullCourse = typeof COURSES !== 'undefined' ? COURSES.find(item => item.key === c.key) : null;
    
    const courseTitle = fullCourse ? fullCourse.title[getLang()] : (t(`skill.${c.key}.title`) !== `skill.${c.key}.title` ? t(`skill.${c.key}.title`) : c.key);
    const courseDesc = fullCourse ? fullCourse.description[getLang()] : "A fun and interactive journey to learn English from scratch with clear, simple steps for everyone.";
    const courseLessons = fullCourse ? `${fullCourse.lessons} ${getLang() === 'ar' ? 'وحدات تفاعلية' : 'Units'}` : "6 Units";
    const coursePrice = fullCourse ? fullCourse.price[getLang()] : "59";

    return `
    <article class="card" style="display:flex;flex-direction:column">
      <div class="flex items-center gap-2">
        <span class="lvl-pill lvl-pill-sm">
          ${c.level === "Free" ? "A1" : c.level.startsWith("+") ? "+" + formatNumber(c.level.replace("+","")) : c.level}
        </span>
      </div>

      <h3 class="text-lg font-semibold mt-3">${courseTitle}</h3>

      <p class="muted text-sm mt-2">${courseDesc}</p>

      <div class="mt-4 flex items-center gap-4 muted text-xs">
        <span>📖 ${courseLessons}</span>
      </div>

      <div class="mt-5 flex items-center justify-between" style="border-top:1px solid var(--border);padding-top:1rem">
        <span class="font-bold">
          <img src="../images/SARIcon.png" alt="SAR" class="currency-icon"> ${formatNumber(coursePrice)}
        </span>
        <a href="#" class="text-primary text-sm font-semibold course-details-trigger" data-course-key="${c.key}">
          ${t("courses.details")} →
        </a>
      </div>
    </article>
  `}).join('');

  const gridEl = document.getElementById(`${skill.toLowerCase()}-grid`);
  if (gridEl) gridEl.innerHTML = courseCards;
}

function getFoundationModalContent(lang){
  if(lang === 'ar'){
    return `
      <h2 id="foundation-modal-title">أولاً: عن الدورة (في سطور)</h2>
      <p>انطلق في رحلة التحدث بالإنجليزية بثقة.. من الصفر وحتى التأسيس المتين!<br>
      التجربة التعليمية الأكثر تفاعلية على الإطلاق لتأسيس لغتك الإنجليزية (Level A1). هنا</p>

      <h3>ثانياً: محتوى الدورة (ماذا ستتعلم؟)</h3>
      <div class="modal-list">
        <p><strong>الوحدة 1 | الحروف والأصوات:</strong> نطق الحروف، التمييز بين أصواتها، والحروف الصامتة والمركبة.</p>
        <p><strong>الوحدة 2 | فعل الكينونة (Verb to Be):</strong> وصف الأشخاص والأشياء، وصياغة الإثبات والنفي والسؤال.</p>
        <p><strong>الوحدة 3 | أقسام الكلام:</strong> معرفة الأسماء، الأفعال، الصفات، وحروف الجر وكيف تعمل معاً.</p>
        <p><strong>الوحدة 4 | بناء الجملة والأدوات:</strong> تركيب جملة صحيحة (فاعل + فعل + مفعول) واستخدام (A, An, The).</p>
        <p><strong>الوحدة 5 | المضارع البسيط:</strong> التعبير عن روتينك اليومي، وعاداتك، وصياغة الأسئلة باستخدام (Do/Does).</p>
        <p><strong>الوحدة 6 | مفردات ومحادثات:</strong> التحيات، الأرقام، أفراد العائلة، والتدرب على محادثات واقعية للتعريف بالنفس.</p>
      </div>

      <h3>ثالثاً: الميزات التفاعلية (سر تميّز الدورة)</h3>
      <p>ما يجعل هذه الدورة الفريدة من نوعها والأفضل على الإطلاق هو نظام التفاعل الذكي المدمج بها:</p>
      <div class="modal-list">
        <p><strong>نظام صوتي تفاعلي:</strong> لا تخمن النطق بعد اليوم! كل كلمة وجملة مدعومة بأزرار صوتية فورية لتسمع النطق الصحيح وتكرره.</p>
        <p><strong>تمارين تطبيقية مستمرة:</strong> بعد كل قاعدة ومفردة، ستجد تمارين تفاعلية فورية (سحب وإفلات، إعادة ترتيب، واختيارات) لتتأكد من فهمك في نفس اللحظة.</p>
        <p><strong>اختبار نهائي شامل:</strong> في نهاية الدورة، ستخوض اختباراً ذكياً يقيس بدقة مدى استيعابك لكل ما درست ويؤكد جاهزيتك للانتقال للمستوى التالي.</p>
        <p><strong>شهادة إتمام:</strong> بمجرد اجتيازك للاختبار النهائي، ستحصل فوراً على شهادة إثبات كفاءة تتوج بها جهودك المبذولة.</p>
      </div>
    `;
  }
  
  // النص باللغة الإنجليزية
  return `
      <h2 id="foundation-modal-title">First: About the Course</h2>
      <p>Start your journey to speaking English with confidence—from absolute beginner to a strong foundation!<br>
      Experience one of the most interactive English learning courses designed for Level A1 learners. Build your language skills through engaging lessons, practical exercises, and interactive learning tools.</p>

      <h3>Second: Course Content (What Will You Learn?)</h3>
      <div class="modal-list">
        <p><strong>Unit 1 | Letters & Sounds:</strong> Learn the English alphabet, letter pronunciation, different letter sounds, silent letters, and common letter combinations.</p>
        <p><strong>Unit 2 | Verb to Be:</strong> Learn how to describe people and objects, and form affirmative, negative, and question sentences using the verb to be.</p>
        <p><strong>Unit 3 | Parts of Speech:</strong> Understand nouns, verbs, adjectives, and prepositions, and learn how they work together to form correct sentences.</p>
        <p><strong>Unit 4 | Sentence Structure & Articles:</strong> Build correct English sentences using the basic structure (Subject + Verb + Object) and learn how to use A, An, and The correctly.</p>
        <p><strong>Unit 5 | Present Simple Tense:</strong> Talk about your daily routines and habits, and learn how to ask and answer questions using Do and Does.</p>
        <p><strong>Unit 6 | Vocabulary & Conversations:</strong> Learn greetings, numbers, family members, and practice real-life conversations to introduce yourself confidently.</p>
      </div>

      <h3>Third: Interactive Features (What Makes This Course Unique?)</h3>
      <p>What makes this course truly unique is its built-in interactive learning system:</p>
      <div class="modal-list">
        <p><strong>Interactive Audio Support:</strong> Never guess the pronunciation again! Every word and sentence includes an instant audio button so you can listen, repeat, and improve your pronunciation.</p>
        <p><strong>Continuous Practice Activities:</strong> After every lesson, you’ll complete interactive exercises such as drag-and-drop activities, sentence ordering, and multiple-choice questions to reinforce your understanding.</p>
        <p><strong>Comprehensive Final Exam:</strong> At the end of the course, you’ll take a smart final assessment that accurately measures your progress and confirms your readiness for the next level.</p>
        <p><strong>Certificate of Completion:</strong> Once you successfully pass the final exam, you’ll instantly receive a certificate recognizing your achievement and the effort you’ve put into completing the course.</p>
      </div>
    `;
}

function handleRegistrationAction(courseKey) {
  if (!isLoggedIn) {
    if (typeof popShowAlert !== 'undefined') {
      popShowAlert(getLang() === 'ar' ? 'يرجى تسجيل الدخول أو إنشاء حساب أولاً لتتمكن من التسجيل في الدورة.' : 'Please login or create an account first to register for the course.');
    } else {
      alert(getLang() === 'ar' ? 'يرجى تسجيل الدخول أولاً' : 'Please login first');
    }
    const authTrigger = document.getElementById("auth-trigger-icon");
    if (authTrigger) authTrigger.click();
  } else {
    if (typeof goToSalla !== 'undefined') {
      goToSalla(courseKey);
    } else {
      alert("سيتم تفعيل الشراء عبر تطبيق سلة قريبًا ❤️");
    }
  }
}

function renderFoundationModal(){
  const lang = getLang();
  const modalBody = document.querySelector('#foundation-modal .modal-body');
  const actions = document.querySelector('#foundation-modal .modal-actions');
  
  if(modalBody) modalBody.innerHTML = getFoundationModalContent(lang);
  
  if(actions){
    const isPurchased = userPurchasedKeys.includes('english-foundation');
    
    // زر النافذة المنبثقة الداخلي يتغير ديناميكياً
const primaryBtn = isPurchased
  ? `<button type="button" class="cta modal-primary-btn" onclick="window.location.href='../Foundation-Course/foundation-course/index.html'">${lang === 'ar' ? 'فتح الدورة ←' : 'Open Course ←'}</button>`
  : `<button type="button" class="cta modal-primary-btn" onclick="handleRegistrationAction('english-foundation')">${lang === 'ar' ? 'سجّل الآن' : 'Register Now'}</button>`;

    actions.innerHTML = `
      <button type="button" class="btn-secondary modal-close-btn">${lang === 'ar' ? 'إغلاق' : 'Close'}</button>
      ${primaryBtn}
    `;
  }
}

function openFoundationModal(event){
  if(event) event.preventDefault();
  const modal = document.getElementById('foundation-modal');
  if(!modal) return;
  renderFoundationModal();
  modal.classList.remove('hidden');
  modal.setAttribute('aria-hidden','false');
  document.body.style.overflow = 'hidden';
}

function closeFoundationModal(){
  const modal = document.getElementById('foundation-modal');
  if(!modal) return;
  modal.classList.add('hidden');
  modal.setAttribute('aria-hidden','true');
  document.body.style.overflow = '';
}

document.addEventListener('click', function(event){
  const trigger = event.target.closest('.course-details-trigger');
  if(trigger){
    event.preventDefault();
    openFoundationModal();
    return;
  }
  if(event.target.closest('.modal-close-btn') || event.target.id === 'foundation-modal-overlay'){
    closeFoundationModal();
  }
});

document.addEventListener('keydown', function(event){
  if(event.key === 'Escape') closeFoundationModal();
});

// تشغيل وتهيئة الصفحة بالتزامن
document.addEventListener("DOMContentLoaded", async () => {
  await renderCourses();
  applyLang();
});
</script>
