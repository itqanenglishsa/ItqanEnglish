<script>


const SKILL_COURSES = {
  Foundation: {
    All: [
      { key: "foundation", level: "Free", title: "Foundation Course", price: 59 }
    ],
    Free: [
      { key: "foundation", level: "Free", title: "Foundation Course", price: 59 }
    ]
  }
};

function renderCourses(){
  const lang = getLang();

  // 1) نفس جزء الـ featured القديم (ما غيرناه)

  const featuredContainer = document.getElementById("featured");


  // 🔹 إعادة بناء قسم Featured courses
featuredContainer.innerHTML = COURSES
  .filter(c => c.featured)
  .map(c => renderCourseCard(c, lang, false))
  .join('');

  
  const LEVELS = {
    Foundation: ["All", "Free"]
  };
  const SKILLS = ["Foundation"];

  // 2) نبني الفلاتر لكل مهارة (أيقونات فقط)
  SKILLS.forEach(skill => {
    document.getElementById(`${skill.toLowerCase()}-filters`).innerHTML =
  LEVELS[skill].map(level => {

  let label = level;

  if(level === "All"){
    label = t("filter.all");
  }
  else if(level === "Free"){
    label = t("filter.free");
  }
  else if(level.startsWith("+")){
  const num = level.replace("+","");

  label = getLang() === "ar"
    ? "+" + num.replace(/\d/g, d => "٠١٢٣٤٥٦٧٨٩"[d])
    : level;
}

  return `
    <button class="filter-btn"
      onclick="setActiveFilter(this, '${skill}', '${level}')">
      ${label}
    </button>
  `;
}).join('');

    // أول ما تفتح الصفحة: نعرض All لكل مهارة
    renderSkill(skill, "All");
  });
}


function setActiveFilter(btn, skill, level){
  // إزالة التفعيل من كل الأزرار داخل نفس المهارة
  document.querySelectorAll(`#${skill.toLowerCase()}-filters .filter-btn`)
    .forEach(b => b.classList.remove('active-filter'));

  // تفعيل الزر الحالي
  btn.classList.add('active-filter');

  // عرض الكورسات
  renderSkill(skill, level);
}

function formatNumber(num){
  const lang = getLang();

  // تحويل النص إلى رقم لو أمكن
  const n = Number(num);

  // لو ما قدر يتحول (مثل Free) نرجعه كما هو
  if (isNaN(n)) return num;

  return lang === "ar"
    ? n.toLocaleString("ar-EG")
    : n.toLocaleString("en-US");
}

function renderSkill(skill, level){
  const courses = SKILL_COURSES[skill][level];

    const courseCards = courses.map((c) => `
    <article class="card" style="display:flex;flex-direction:column">

      <div class="flex items-center gap-2">
        <span class="lvl-pill lvl-pill-sm">
          ${
  c.level === "Free"
    ? (getLang() === "ar" ? "A1" : "A1")
    : c.level.startsWith("+")
      ? "+" + formatNumber(c.level.replace("+",""))
      : c.level
}
        </span>
      </div>

      <h3 class="text-lg font-semibold mt-3">
  ${t(`skill.${c.key}.title`) !== `skill.${c.key}.title`
      ? t(`skill.${c.key}.title`)
      : c.title}
</h3>

      <p class="muted text-sm mt-2">
  ${t(`skill.${c.key}.desc`) !== `skill.${c.key}.desc`
      ? t(`skill.${c.key}.desc`)
      : "A fun and interactive journey to learn English from scratch with clear, simple steps for everyone."}
</p>

      <div class="mt-4 flex items-center gap-4 muted text-xs">
        <span>
📖 ${
  t(`skill.${c.key}.lessons`) !== `skill.${c.key}.lessons`
    ? t(`skill.${c.key}.lessons`)
    : "6 Units"
}
</span>
      </div>

      <div class="mt-5 flex items-center justify-between" style="border-top:1px solid var(--border);padding-top:1rem">
        <span class="font-bold">
  ${
  c.price === "Free"
    ? (getLang() === "ar" ? "مجاني" : "Free")
        : `<img src="../images/SARIcon.png" alt="SAR" class="currency-icon"> ${formatNumber(c.price)}`
}
</span>
             <a href="#" class="text-primary text-sm font-semibold course-details-trigger" data-course-key="${c.key}">
  ${t("courses.details")} →
</a>
      </div>

    </article>
  `).join('');

  document.getElementById(`${skill.toLowerCase()}-grid`).innerHTML = courseCards;
}








function getFoundationModalContent(lang){
  if(lang === 'ar'){
    return `
      <h2 id="foundation-modal-title">أولاً: عن الدورة (في سطور)</h2>
      <p>انطلق في رحلة التحدث بالإنجليزية بثقة.. من الصفر وحتى التأسيس المتين!
      التجربة التعليمية الأكثر تفاعلية على الإطلاق لتأسيس لغتك الإنجليزية (Level A1). هنا</p>

      <h3>ثانيًا: محتوى الدورة (ماذا ستتعلم؟)</h3>
      <div class="modal-list">
        <p>الوحدة 1 | الحروف والأصوات: نطق الحروف، التمييز بين أصواتها، والحروف الصامتة والمركبة.</p>
        <p>الوحدة 2 | فعل الكينونة (Verb to Be): وصف الأشخاص والأشياء، وصياغة الإثبات والنفي والسؤال.</p>
        <p>الوحدة 3 | أقسام الكلام: معرفة الأسماء، الأفعال، الصفات، وحروف الجر وكيف تعمل معاً.</p>
        <p>الوحدة 4 | بناء الجملة والأدوات: تركيب جملة صحيحة (فاعل + فعل + مفعول) واستخدام (A, An, The).</p>
        <p>الوحدة 5 | المضارع البسيط: التعبير عن روتينك اليومي، وعاداتك، وصياغة الأسئلة باستخدام (Do/Does).</p>
        <p>الوحدة 6 | مفردات ومحادثات: التحيات، الأرقام، أفراد العائلة، والتدرب على محادثات واقعية للتعريف بالنفس.</p>
      </div>

      <h3>ثالثًا: الميزات التفاعلية (سر تميّز الدورة)</h3>
      <div class="modal-list">
        <p>نظام صوتي تفاعلي: لا تخمن النطق بعد اليوم! كل كلمة وجملة مدعومة بأزرار صوتية فورية لتسمع النطق الصحيح وتكرره.</p>
        <p>تمارين تطبيقية مستمرة: بعد كل قاعدة ومفردة، ستجد تمارين تفاعلية فورية (سحب وإفلات، إعادة ترتيب، واختيارات) لتتأكد من فهمك في نفس اللحظة.</p>
        <p>اختبار نهائي شامل: في نهاية الدورة، ستخوض اختباراً ذكياً يقيس بدقة مدى استيعابك لكل ما درست ويؤكد جاهزيتك للانتقال للمستوى التالي.</p>
        <p>شهادة إتمام: بمجرد اجتيازك للاختبار النهائي، ستحصل فوراً على شهادة إثبات كفاءة تتوج بها جهودك وتدعم بها ملفك الشخصي.</p>
      </div>
    `;
  }

  return `
      <h2 id="foundation-modal-title">First: About the course (in brief)</h2>
      <p>Start your journey to speaking English with confidence... from zero to a strong and solid foundation! The most interactive learning experience ever to build your English language foundation (Level A1). Here</p>

      <h3>Second: Course content (what will you learn?)</h3>
      <div class="modal-list">
        <p>Unit 1 | Letters and sounds: letter pronunciation, distinguishing their sounds, and consonant and digraph letters.</p>
        <p>Unit 2 | The verb to be: describing people and things, forming affirmatives, negatives, and questions.</p>
        <p>Unit 3 | Parts of speech: learning nouns, verbs, adjectives, and prepositions and how they work together.</p>
        <p>Unit 4 | Sentence building and articles: constructing a correct sentence (subject + verb + object) and using (A, An, The).</p>
        <p>Unit 5 | Simple present: talking about your daily routine, habits, and forming questions with (Do/Does).</p>
        <p>Unit 6 | Vocabulary and conversations: greetings, numbers, family members, and practicing real conversations for introducing yourself.</p>
      </div>

      <h3>Third: Interactive features (the course’s secret advantage)</h3>
      <div class="modal-list">
        <p>Interactive voice system: don’t guess pronunciation anymore! Every word and sentence is supported by instant audio buttons so you can hear the correct pronunciation and repeat it.</p>
        <p>Continuing practice exercises: after every rule and vocabulary item, you’ll find instant interactive exercises (drag and drop, reorder, and multiple-choice) to check your understanding right away.</p>
        <p>Comprehensive final test: at the end of the course, you’ll take a smart test that accurately measures what you’ve learned and confirms you’re ready for the next level.</p>
        <p>Completion certificate: once you pass the final test, you’ll immediately receive a certificate proving your competency and supporting your profile.</p>
      </div>
    `;
}

function renderFoundationModal(){
  const lang = getLang();
  const modalBody = document.querySelector('#foundation-modal .modal-body');
  const actions = document.querySelector('#foundation-modal .modal-actions');
  if(modalBody){
    modalBody.innerHTML = getFoundationModalContent(lang);
  }
  if(actions){
    actions.innerHTML = `
      <button type="button" class="btn-secondary modal-close-btn">${lang === 'ar' ? 'إغلاق' : 'Close'}</button>
      <button type="button" class="cta modal-primary-btn" onclick="goToSalla('foundation')">
  ${lang === 'ar' ? 'سجّل الآن' : 'Register Now'}
</button>

    `;
  }
}

function openFoundationModal(event){
  if(event) event.preventDefault();
  const modal = document.getElementById('foundation-modal');
  if(!modal) return;
  renderFoundationModal();
  modal.classList.remove('hidden');
  modal.setAttribute('aria-hidden','false');
  document.body.style.overflow = 'hidden';
}

function closeFoundationModal(){
  const modal = document.getElementById('foundation-modal');
  if(!modal) return;
  modal.classList.add('hidden');
  modal.setAttribute('aria-hidden','true');
  document.body.style.overflow = '';
}

document.addEventListener('click', function(event){
  const trigger = event.target.closest('.course-details-trigger');
  if(trigger){
    event.preventDefault();
    openFoundationModal();
    return;
  }
  if(event.target.closest('.modal-close-btn') || event.target.id === 'foundation-modal-overlay'){
    closeFoundationModal();
  }
});

document.addEventListener('keydown', function(event){
  if(event.key === 'Escape'){
    closeFoundationModal();
  }
});


</script>
