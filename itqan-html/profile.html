<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title data-i18n="profile.title"></title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&family=Noto+Kufi+Arabic:wght@400;500;600;700;800&display=swap"/>
<link rel="stylesheet" href="styles.css"/>

<style>
html[lang="ar"] .profile-title { text-align: right; }
html[lang="en"] .profile-title { text-align: left; }
.profile-title {
  text-align: start; /* يتبع اتجاه الصفحة تلقائيًا */
}

.profile-title {
  display: flex !important;
  justify-content: center !important;
}


</style>

</head>

<body>


<header class="header">
 <div class="header-inner">
  <a href="../index.html" class="logo">
    <img src="../images/logo.png" alt="Logo" style="height:40px">
  </a>

  <!-- مخفية لأن المستخدم مسجل دخول -->
  <a href="#" id="auth-trigger-icon" class="user-icon-link" style="display:none;"></a>

  <nav class="nav">
    <div class="menu-wrap">
      <button id="menu-trigger" class="pill" aria-haspopup="true">
        ☰ <span data-i18n="nav.menu"></span>
      </button>

      <div id="menu-panel" class="menu-panel">
        <a href="../index.html" data-i18n="nav.home"></a>
        <a href="courses.html" data-i18n="nav.courses"></a>
        <a href="about.html" data-i18n="nav.about"></a>
      </div>
    </div>

    <button class="pill" onclick="setLang(getLang()==='en'?'ar':'en')">
        🌐
      <span data-i18n="lang.toggle" style="display:none;"></span>
    </button>
  </nav>
</div>

<!-- مخفي داخل البروفايل -->
<div id="auth-modal-overlay" class="pop-modal-overlay" style="display:none !important;"></div>

</header>

<main class="container" style="padding:4rem 1.5rem">

  <article class="card card-lg" style="text-align:center; margin-bottom:3rem;">
    <h2 class="text-2xl font-bold profile-title" data-i18n="profile.title"></h2>

    <p id="user-email" class="text-lg mt-4" style="color:var(--muted-foreground)">
      <span data-i18n="profile.email"></span>
      <span id="email-value"></span>
    </p>

    <button id="logout-btn" class="cta mt-6" style="padding:.75rem 2rem;" data-i18n="profile.logout"></button>
  </article>

  <div class="flex items-center gap-2 mb-6">
    <span style="color:var(--primary)">★</span>
    <h2 class="text-2xl font-bold" data-i18n="profile.courses"></h2>
  </div>

  <div id="courses-list" class="grid grid-2"></div>

</main>

<footer class="footer">
  <div class="footer-inner">
    <div class="logo"><img src="../images/logo.png" alt="Logo" style="height:40px"></div>

    <div class="stores" style="margin-top:0">
      <a href="https://apps.apple.com/sa/app/english-إتقان/id6759668469" target="_blank" rel="noopener">
        <img src="../images/appleIcon.png" alt="Download on the App Store" style="height:50px">
      </a>

      <div class="store store-disabled" aria-disabled="true">
        <span style="font-size:1.5rem">▶</span>
        <span class="store-lines">
          <span class="store-top" data-i18n="store.google.top"></span>
          <span class="store-bot" data-i18n="store.google.soon"></span>
        </span>
      </div>
    </div>

    <div class="box">
      <h3 style="font-size: 1.2rem; margin:0;" data-i18n="footer.contact"></h3>

      <div style="display:flex; align-items:center; gap:10px; margin:0.5rem 0;">
        <a href="https://wa.me/966508538283" target="_blank">
          <img src="../images/WhatsAppIcon.png" style="width:31px; height:31px;">
        </a>

        <a href="https://www.tiktok.com/@itqanenglish" target="_blank">
          <img src="../images/TikTokIcon.png" style="width:30px; height:30px;">
        </a>

        <a href="https://t.me/Itqanenglish_sa" target="_blank">
          <img src="../images/TelegramIcon.png" style="width:30px; height:30px;">
        </a>
      </div>
    </div>

    <p>© <span id="year"></span> Itqan English. <span data-i18n="footer.rights"></span></p>
  </div>
</footer>

<script>document.getElementById('year').textContent=new Date().getFullYear();</script>

<script src="app.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
  applyLang();

  const email = localStorage.getItem("userEmail");

  if (email) {
    document.getElementById("email-value").textContent = email;
  } else {
    document.getElementById("email-value").textContent = t("profile.notRegistered") || "غير مسجل";

  }

  const purchasedKeys = JSON.parse(localStorage.getItem("purchasedCourses") || "[]");
const purchasedCourses = COURSES.filter(c => purchasedKeys.includes(c.key));

if (purchasedCourses.length === 0) {
  document.getElementById("courses-list").innerHTML = `
    <article class="card" style="text-align:center; padding:2rem;">
      <p class="muted" data-i18n="profile.empty"></p>
    </article>
  `;
} else {
  document.getElementById("courses-list").innerHTML =
    purchasedCourses.map(c => renderCourseCard(c, lang, true)).join('');
}
applyLang();


  document.getElementById("logout-btn").onclick = () => {
    localStorage.removeItem("userEmail");
    popShowAlert(t("profile.logout"));
    setTimeout(() => {
      window.location.href = "../index.html";
    }, 800);
  };
});
</script>

</body>
</html>
