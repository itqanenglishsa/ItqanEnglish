<main id="test-root" class="container-tight" style="padding:2.5rem 1.5rem"></main>
<script>
const STORAGE_KEY = "itqan_test_answers";
let state = { started:false, index:0, answers:{}, secondsLeft:20*60, timer:null };

function renderIntro(){
  document.getElementById('test-root').innerHTML = `
    <div class="card card-lg" style="padding:2.5rem">
      <span class="badge" style="background:color-mix(in oklch,var(--primary) 10%,transparent);border-color:transparent;color:var(--primary);font-weight:600">🛡 ${t('test.intro.badge')}</span>
      <h1 class="h1 mt-4" style="font-size:2.25rem">${t('test.intro.title')}</h1>
      <p class="muted mt-3">${t('test.intro.desc')}</p>
      <ul class="mt-6" style="display:flex;flex-direction:column;gap:.75rem;font-size:.875rem">
        ${['r1','r2','r3','r4'].map(r=>`<li style="display:flex;gap:.75rem"><span style="margin-top:.5rem;width:6px;height:6px;border-radius:50%;background:var(--primary);flex-shrink:0"></span>${t('test.intro.'+r)}</li>`).join('')}
      </ul>
      <button class="cta cta-lg mt-8" onclick="start()">${t('test.intro.cta')} →</button>
    </div>`;
}

function start(){
  state.started = true;

  // خلط الأسئلة عشوائياً قبل بدء الاختبار
  QUESTIONS.sort(() => Math.random() - 0.5);

  state.timer = setInterval(()=>{
    state.secondsLeft = Math.max(0, state.secondsLeft-1);
    updateTimer();
    if(state.secondsLeft === 0) finish();
  }, 1000);

  renderQ();
}

function updateTimer(){
  const el = document.getElementById('timer');
  if(!el) return;
  const mm = String(Math.floor(state.secondsLeft/60)).padStart(2,'0');
  const ss = String(state.secondsLeft%60).padStart(2,'0');
  el.textContent = mm+':'+ss;
}

function renderQ(){
 
  const q = QUESTIONS[state.index];
  const total = QUESTIONS.length;
  const progress = Math.round((state.index/total)*100);
  const selected = state.answers[q.id];
  document.getElementById('test-root').innerHTML = `
    <div class="flex items-center justify-between text-sm mb-6">
      <span class="muted font-medium">${t('test.qof',{n:state.index+1,t:total})}</span>
      <span class="timer">⏱ <span id="timer">00:00</span></span>
    </div>
    <div class="q-bar"><div class="q-bar-fill" style="width:${progress}%"></div></div>
    <div class="card card-lg" style="padding:2rem">
      <div class="mb-3"><span class="lvl-pill lvl-pill-sm" style="background:color-mix(in oklch,var(--primary) 10%,transparent);color:var(--primary)">${t('section.'+q.section)}</span></div>
      ${q.context?`<div class="q-context">${q.context}</div>`:''}
     
     <h2 class="text-2xl font-semibold q-prompt-text" style="display:block; text-align:left;">
  ${q.section === "Listening" ? `
    <div style="display: flex; justify-content: center; width: 100%;">
      <button class="audio-btn" onclick="playAudio('${q.audioSrc}')" style="display: inline-flex; justify-content: center; align-items: center; border: 2px solid #3B82F6; border-radius: 50%; width: 60px; height: 60px; padding: 10px; background: transparent; margin-bottom: 10px;">
        <svg viewBox="0 0 64 64" width="100%" height="100%">
          <path d="M26 20 L18 26 H12 C10.9 26 10 26.9 10 28 V36 C10 37.1 10.9 38 12 38 H18 L26 44 C27.1 44 28 43.1 28 42 V22 C28 20.9 27.1 20 26 20 Z" fill="#3B82F6"/>
          <path d="M34 24 C37 26 39 29 39 32 C39 35 37 38 34 40" stroke="#3B82F6" stroke-width="3" fill="none"/>
          <path d="M40 20 C44 23 47 27 47 32 C47 37 44 41 40 44" stroke="#3B82F6" stroke-width="3" fill="none"/>
        </svg>
      </button>
    </div>
    
  ` : ''}
  ${q.prompt}
</h2>

      <div class="mt-6" style="display:flex;flex-direction:column;gap:.75rem">
        ${q.options.map((opt,i)=>`<button class="choice ${selected===i?'sel':''}" onclick="select(${i})"><span class="choice-letter">${String.fromCharCode(65+i)}</span><span>${opt}</span></button>`).join('')}
      </div>
    </div>
    <div class="nav-btns">
      <button class="btn-secondary" ${state.index===0?'disabled':''} onclick="prev()">← ${t('test.prev')}</button>
      <button class="btn-primary" ${selected===undefined?'disabled':''} onclick="next()">${state.index+1===total?t('test.finish'):t('test.next')} →</button>
    </div>`;
  updateTimer();
}

function select(i){ const q=QUESTIONS[state.index]; state.answers[q.id]=i; renderQ(); }
function prev(){
    if(currentAudio){
        currentAudio.pause();
        currentAudio.currentTime = 0;
    }

    if(state.index > 0){
        state.index--;
        renderQ();
    }
}
function next(){
    // أوقف الصوت قبل الانتقال
    if(currentAudio){
        currentAudio.pause();
        currentAudio.currentTime = 0;
    }

    // لو فيه سؤال بعده → انتقل
    if(state.index + 1 < QUESTIONS.length){
        state.index++;
        renderQ();
    } 
    // لو هذا آخر سؤال → اعرض النتيجة
    else {
        finish();
    }
}

let currentAudio = null;

function playAudio(src){
  if(currentAudio){
    currentAudio.pause();
    currentAudio.currentTime = 0;
  }

  currentAudio = new Audio(src);
  currentAudio.play().catch(err => {
    console.log("Audio error:", err);
  });
}

function finish(){ if(state.timer) clearInterval(state.timer); try{ sessionStorage.setItem(STORAGE_KEY, JSON.stringify(state.answers)); }catch{} location.href='results.html'; }

document.addEventListener('DOMContentLoaded', renderIntro);
</script>
