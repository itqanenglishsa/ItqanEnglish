<!-- ⭐ تعريف Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const { createClient } = supabase;

  const supabaseUrl = "https://jacylpaxxgubvhofpuup.supabase.co";
  const supabaseAnonKey = "sb_publishable_nZWgIK-1xvFsUEBYMfnsrw_l_Dzl2Ai";

  const supabaseClient = createClient(supabaseUrl, supabaseAnonKey);
</script>

<!-- ⭐ كود التسجيل + Google -->
<script>
// فتح نافذة التسجيل
document.getElementById("auth-trigger-icon").onclick = () => {
  document.getElementById("auth-modal-overlay").style.display = "flex";
  loadRegisterForm();
};

// إغلاق النافذة
document.getElementById("close-modal-btn").onclick = () => {
  document.getElementById("auth-modal-overlay").style.display = "none";
};

// تحميل نموذج التسجيل
function loadRegisterForm() {
  document.getElementById("pop-dynamic-form").innerHTML = `
    <button id="google-btn" class="cta cta-lg" style="width:100%;margin-top:1rem;">
      تسجيل الدخول عبر Google
    </button>
  `;

  // زر Google
  document.getElementById("google-btn").onclick = async () => {
    const { data, error } = await supabaseClient.auth.signInWithOAuth({
      provider: "google",
      options: {
        redirectTo: "https://itqanenglishsa.vercel.app/profile.html"
      }
    });

    if (error) {
      console.error(error);
      alert("حدث خطأ أثناء تسجيل الدخول");
    }
  };
}

// التحويل للبروفايل بعد تسجيل الدخول
supabaseClient.auth.onAuthStateChange(async (event, session) => {
  if (session && session.user) {
    const email = session.user.email;
    localStorage.setItem("userEmail", email);
    window.location.href = "profile.html";
  }
});
</script>

<script src="app.js"></script>
