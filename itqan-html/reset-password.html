<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إعادة تعيين كلمة المرور</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7fc; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .reset-box { background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
    h2 { color: #333; margin-bottom: 20px; }
    input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 25px; border: 1px solid #ccc; box-sizing: border-box; font-size: 15px; outline: none; }
    input:focus { border-color: #0078D4; }
    button { width: 100%; padding: 14px; border-radius: 25px; border: none; background: #0078D4; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.3s; }
    button:hover { background: #005a9e; }
    .alert { color: red; font-size: 14px; margin-bottom: 15px; display: none; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="reset-box">
  <h2>كلمة مرور جديدة</h2>
  <div id="error-msg" class="alert"></div>
  <input type="password" id="new-password" placeholder="كلمة المرور الجديدة">
  <input type="password" id="confirm-password" placeholder="تأكيد كلمة المرور الجديدة">
  <button id="update-btn">تحديث كلمة المرور</button>
</div>

<script>
  // تهيئة سوبابيز داخل هذه الصفحة بشكل مستقل
  const supabaseClient = supabase.createClient(
    "https://jacylpaxxgubvhofpuup.supabase.co", 
    "sb_publishable_nZWgIK-1xvFsUEBYMfnsrw_l_Dzl2Ai"
  );

  // 🛡️ فحص حماية تلقائي فور تحميل الصفحة للتأكد من وجود الجلسة (التوكن القادم من الإيميل)
  document.addEventListener("DOMContentLoaded", async () => {
    const errorEl = document.getElementById("error-msg");
    
    // محاولة جلب بيانات المستخدم من الرابط الحالي
    const { data: { user }, error } = await supabaseClient.auth.getUser();
    
    if (error || !user) {
      errorEl.textContent = "تنبيه: رابط إعادة التعيين هذا غير صالح أو انتهت صلاحيته. يرجى العودة للموقع وطلب رابط جديد.";
      errorEl.style.display = "block";
      // تعطيل زر التحديث لمنع إرسال طلبات خاطئة للسيرفر
      document.getElementById("update-btn").disabled = true;
      document.getElementById("update-btn").style.background = "#ccc";
      document.getElementById("update-btn").style.cursor = "not-allowed";
    }
  });

  document.getElementById("update-btn").onclick = async () => {
    const pass = document.getElementById("new-password").value;
    const confirm = document.getElementById("confirm-password").value;
    const errorEl = document.getElementById("error-msg");

    errorEl.style.display = "none";

    // فحص شروط كلمة المرور
    if (!pass || !confirm) {
      errorEl.textContent = "يرجى تعبئة جميع الحقول.";
      errorEl.style.display = "block";
      return;
    }

    if (pass !== confirm) {
      errorEl.textContent = "كلمات المرور غير متطابقة.";
      errorEl.style.display = "block";
      return;
    }

    if (pass.length < 8) {
      errorEl.textContent = "يجب ألا تقل كلمة المرور عن 8 خانات.";
      errorEl.style.display = "block";
      return;
    }

    try {
      // تحديث كلمة المرور في سوبابيز
      const { error } = await supabaseClient.auth.updateUser({ password: pass });

      if (error) {
        errorEl.textContent = "خطأ: " + error.message;
        errorEl.style.display = "block";
      } else {
        // واجهة النجاح المريحة والأنيقة
        const box = document.querySelector(".reset-box");
        box.innerHTML = `
          <div style="padding: 20px 0;">
            <div style="font-size: 50px; color: #4CAF50; margin-bottom: 15px;">✓</div>
            <h2 style="color: #333; margin-bottom: 10px;">تمت العملية بنجاح!</h2>
            <p style="color: #666; font-size: 15px; margin-bottom: 25px; line-height: 1.6;">
              لقد تم تعيين كلمة السر الجديدة بنجاح تام.<br>يمكنك الآن العودة للموقع وتسجيل الدخول بأمان.
            </p>
            <button onclick="window.location.href='index.html'" style="width: 100%; padding: 14px; border-radius: 25px; border: none; background: #4CAF50; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer;">
  العودة للموقع الرئيسي والتسجيل
</button>
          </div>
        `;
      }
    } catch (err) {
      errorEl.textContent = "حدث خطأ غير متوقع.";
      errorEl.style.display = "block";
    }
  };
</script>

</body>
</html>
