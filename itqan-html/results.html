<main id="results-root" class="container-narrow" style="padding:3rem 1.5rem"></main>
<script>
const STORAGE_KEY = "itqan_test_answers";
function render(){
  const raw = sessionStorage.getItem(STORAGE_KEY);
  if(!raw){ location.href='test.html'; return; }
  let data;
  try { data = calculateLevel(JSON.parse(raw)); } catch { location.href='test.html'; return; }
  const lang = getLang();
  const desc = LEVEL_DESCRIPTIONS[data.level];
  const pct = Math.round((data.score/data.total)*100);
  const sections = Object.entries(data.perSection)
  .filter(([k]) => k !== "levels")
  .map(([k,v])=>{
    const p = v.total ? Math.round((v.correct/v.total)*100) : 0;
    return `<div class="card"><p class="text-sm muted font-medium">${t('section.'+k)}</p><p class="text-2xl font-bold mt-2">${data.perSectionLevel[k]}</p><p class="text-xs muted mt-2">${t('results.correctOf',{c:v.correct,t:v.total})}</p><div class="bar-track mt-3"><div class="bar-fill" style="width:${p}%;background:var(--gradient-hero)"></div></div></div>`;
  }).join('');
  const levelsHtml = ['A1','A2','B1','B2'].map(lvl=>{
    const v = data.perLevel[lvl]; const p = v.total ? Math.round((v.correct/v.total)*100) : 0;
    const cur = lvl === data.level;
    return `<div class="flex items-center gap-4"><div style="width:2.5rem;flex-shrink:0;font-weight:700;font-size:.875rem;color:${cur?'var(--primary)':'var(--muted-foreground)'}">${lvl}</div><div style="flex:1"><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${cur?'var(--gradient-hero)':'var(--primary-soft)'}"></div></div></div><div class="muted text-sm" style="width:5rem;text-align:end;font-variant-numeric:tabular-nums">${v.correct}/${v.total}</div></div>`;
  }).join('');
  document.getElementById('results-root').innerHTML = `
    <div class="card card-lg" style="overflow:hidden;padding:0;box-shadow:var(--shadow-elegant)">
      <div class="result-hero">
        <div style="margin:0 auto;width:56px;height:56px;border-radius:1rem;background:rgba(255,255,255,.2);backdrop-filter:blur(8px);display:grid;place-items:center;font-size:1.5rem">🏆</div>
        <p class="mt-5 text-sm" style="text-transform:uppercase;letter-spacing:.15em;color:rgba(255,255,255,.8)">${t('results.your')}</p>
        <p class="result-num">${data.level}</p>
        <p class="text-2xl font-semibold mt-2">${desc.title[lang]}</p>
        <p style="margin:1rem auto 0;max-width:36rem;color:rgba(255,255,255,.9)">${desc.desc[lang]}</p>
      </div>
      <div class="stat-row">
        <div class="text-center"><p class="stat-label">${t('results.score')}</p><p class="stat-value">${data.score} / ${data.total}</p></div>
        <div class="text-center"><p class="stat-label">${t('results.accuracy')}</p><p class="stat-value">${pct}%</p></div>
        <div class="text-center"><p class="stat-label">${t('results.level')}</p><p class="stat-value">${data.level}</p></div>
      </div>
    </div>
    <section class="mt-10"><h2 class="text-xl font-semibold">${t('results.bySkill')}</h2><div class="grid grid-3 mt-4">${sections}</div></section>
    <section class="mt-10"><h2 class="text-xl font-semibold">${t('results.byLevel')}</h2><div class="card mt-4" style="padding:1.5rem"><div style="display:flex;flex-direction:column;gap:1rem">${levelsHtml}</div></div></section>
        <div class="results-buttons mt-10 flex items-center justify-center gap-4" style="flex-wrap:wrap">
      <button class="btn-secondary" onclick="sessionStorage.removeItem(STORAGE_KEY);location.href='test.html'">↻ ${t('results.retake')}</button>
      <a href="courses.html" class="cta" data-i18n="results.viewCourses"></a>
    </div>`;
}
document.addEventListener('DOMContentLoaded', render);
</script>
